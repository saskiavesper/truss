name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix test
  atlas-migration-validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.3-pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truss_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: ariga/setup-atlas@v0
      - run: atlas migrate validate --env ci
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mix deps.get
      - run: mix coverage
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mix deps.get
      - run: MIX_ENV=prod mix compile --warnings-as-errors
